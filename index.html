<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Крестики-нолики (Phaser 3)</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap");

    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0e14;
      font-family: "Orbitron", sans-serif;
    }

    #game-root {
      border: 1px solid #1f2937;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>

<body>
  <div id="game-root"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    class GameState {
      constructor() { this.reset(); }
      reset() {
        this.board = Array(9).fill(null);
        this.currentPlayer = "X";
        this.gameOver = false;
      }
      makeMove(index) {
        if (this.gameOver || this.board[index] !== null) return { valid: false };
        this.board[index] = this.currentPlayer;
        const winLine = this.getWinningLine(this.currentPlayer);
        if (winLine) {
          this.gameOver = true;
          return { valid: true, winner: this.currentPlayer, winLine };
        }
        if (this.board.every(cell => cell !== null)) {
          this.gameOver = true;
          return { valid: true, draw: true };
        }
        this.currentPlayer = this.currentPlayer === "X" ? "O" : "X";
        return { valid: true, nextPlayer: this.currentPlayer };
      }
      getWinningLine(player) {
        const lines = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];
        for (const line of lines) {
          const [a, b, c] = line;
          if (this.board[a] === player && this.board[b] === player && this.board[c] === player) return line;
        }
        return null;
      }
    }

    class WalletSystem {
      constructor() { this.coins = 0; }
      rollVictoryReward() {
        const gain = Phaser.Math.Between(10, 50);
        this.coins += gain;
        return { gain };
      }
    }

    class BotAI {
      constructor(botSymbol, playerSymbol, mistakeChance = 0.3) {
        this.botSymbol = botSymbol;
        this.playerSymbol = playerSymbol;
        this.mistakeChance = mistakeChance;
        this.winningLines = [
          [0, 1, 2],
          [3, 4, 5],
          [6, 7, 8],
          [0, 3, 6],
          [1, 4, 7],
          [2, 5, 8],
          [0, 4, 8],
          [2, 4, 6],
        ];
      }

      chooseMove(board) {
        const available = this.getAvailableMoves(board);
        if (available.length === 0) {
          return null;
        }

        if (Math.random() < this.mistakeChance) {
          return Phaser.Utils.Array.GetRandom(available);
        }

        const winningMove = this.findCriticalMove(board, this.botSymbol);
        if (winningMove !== null) {
          return winningMove;
        }

        const blockingMove = this.findCriticalMove(board, this.playerSymbol);
        if (blockingMove !== null) {
          return blockingMove;
        }

        if (board[4] === null) {
          return 4;
        }

        const corners = [0, 2, 6, 8].filter((index) => board[index] === null);
        if (corners.length > 0) {
          return Phaser.Utils.Array.GetRandom(corners);
        }

        return Phaser.Utils.Array.GetRandom(available);
      }

      getAvailableMoves(board) {
        const result = [];
        for (let i = 0; i < board.length; i += 1) {
          if (board[i] === null) {
            result.push(i);
          }
        }
        return result;
      }

      findCriticalMove(board, symbol) {
        for (const [a, b, c] of this.winningLines) {
          const line = [board[a], board[b], board[c]];
          const symbolCount = line.filter((cell) => cell === symbol).length;
          const emptyCount = line.filter((cell) => cell === null).length;
          if (symbolCount === 2 && emptyCount === 1) {
            if (board[a] === null) return a;
            if (board[b] === null) return b;
            return c;
          }
        }
        return null;
      }
    }

    const wallet = new WalletSystem();
    const scoreRecord = { playerWins: 0, botWins: 0 };
    let nextStartingSymbol = "X";

    class TicTacToeScene extends Phaser.Scene {
      constructor() {
        super("TicTacToeScene");
        this.size = 480;
        this.cellSize = this.size / 3;
        this.paddingTop = 96;
      }

      create() {
        this.state = new GameState();
        this.wallet = wallet;
        this.scores = scoreRecord;
        this.botAI = new BotAI("O", "X", 0.4);
        this.displayedCoins = this.wallet.coins;

        this.state.currentPlayer = nextStartingSymbol;
        nextStartingSymbol = nextStartingSymbol === "X" ? "O" : "X";

        this.createStatusUI();
        this.createBoard();
        this.createRestartHint();
        this.createScoreUI();
        this.createWalletUI();
        this.updateScoreUI();
        this.updateWalletUI();

        if (this.state.currentPlayer === "O") {
          this.updateStatus("Ход противника...");
          this.scheduleBotMove();
        } else {
          this.updateStatus("Ваш ход (X)");
        }
      }

      createStatusUI() {
        this.statusText = this.add.text(this.size / 2, 42, "", {
          fontFamily: "Orbitron", fontSize: "28px", color: "#ffffff", fontStyle: "bold"
        }).setOrigin(0.5);
      }

      createBoard() {
        const graphics = this.add.graphics({ lineStyle: { width: 4, color: 0x1f2937 } });

        graphics.strokeRect(0, this.paddingTop, this.size, this.size);

        for (let i = 1; i < 3; i++) {
          graphics.lineBetween(i * this.cellSize, this.paddingTop, i * this.cellSize, this.paddingTop + this.size);
          graphics.lineBetween(0, this.paddingTop + i * this.cellSize, this.size, this.paddingTop + i * this.cellSize);
        }

        for (let i = 0; i < 9; i++) {
          const x = (i % 3) * this.cellSize;
          const y = this.paddingTop + Math.floor(i / 3) * this.cellSize;

          this.add.rectangle(x, y, this.cellSize, this.cellSize, 0x000, 0)
            .setOrigin(0)
            .setInteractive({ useHandCursor: true })
            .on("pointerdown", () => this.handleMove(i));
        }
      }

      handleMove(index) {
        if (this.state.gameOver || this.state.currentPlayer !== "X") return;
        this.processMove(index);
      }

      processMove(index) {
        const result = this.state.makeMove(index);
        if (!result.valid) return;

        this.animatePlacedSymbol(index, this.state.board[index]);

        if (result.winner) {
          if (result.winner === "X") {
            this.scores.playerWins++;
            this.updateStatus("Вы победили!");
            this.applyReward();
          } else {
            this.scores.botWins++;
            this.updateStatus("Вы проиграли!");
          }
          this.updateScoreUI();
          this.drawWinningLine(result.winLine);
        } else if (result.draw) {
          this.updateStatus("Ничья!");
        } else {
          if (this.state.currentPlayer === "O") {
            this.updateStatus("Ход противника...");
            this.scheduleBotMove();
          } else {
            this.updateStatus("Ваш ход (X)");
          }
        }
      }

      scheduleBotMove() {
        this.time.delayedCall(600, () => {
          const move = this.botAI.chooseMove(this.state.board);
          if (move !== null) this.processMove(move);
        });
      }

      animatePlacedSymbol(index, symbol) {
        const [x, y] = this.getCellCenter(index);
        const half = this.cellSize * 0.26;

        if (symbol === "X") {
          const g1 = this.add.line(0, 0, x - half, y - half, x + half, y + half, 0x00f2ff, 0.28).setLineWidth(16).setOrigin(0);
          const c1 = this.add.line(0, 0, x - half, y - half, x + half, y + half, 0x00f2ff, 1).setLineWidth(6).setOrigin(0);
          const g2 = this.add.line(0, 0, x - half, y + half, x + half, y - half, 0x00f2ff, 0.28).setLineWidth(16).setOrigin(0);
          const c2 = this.add.line(0, 0, x - half, y + half, x + half, y - half, 0x00f2ff, 1).setLineWidth(6).setOrigin(0);
          [g1, c1, g2, c2].forEach(l => l.setAlpha(0));
          this.tweens.add({ targets: [g1, c1], alpha: 1, duration: 200 });
          this.tweens.add({ targets: [g2, c2], alpha: 1, duration: 200, delay: 100 });
        } else {
          const radius = this.cellSize * 0.28;
          const gA = this.add.arc(x, y, radius, 0, 0, false).setStrokeStyle(16, 0xff007a, 0.24);
          const cA = this.add.arc(x, y, radius, 0, 0, false).setStrokeStyle(6, 0xff007a, 1);
          this.tweens.addCounter({
            from: 0, to: 360, duration: 280, ease: "Cubic.Out",
            onUpdate: (t) => { gA.setEndAngle(t.getValue()); cA.setEndAngle(t.getValue()); }
          });
        }
      }

      drawWinningLine(winLine) {
        const [sIdx, , eIdx] = winLine;
        const [x1, y1] = this.getCellCenter(sIdx);
        const [x2, y2] = this.getCellCenter(eIdx);

        const angle = Math.atan2(y2 - y1, x2 - x1);
        const off = this.cellSize * 0.35;
        const ex1 = x1 - Math.cos(angle) * off;
        const ey1 = y1 - Math.sin(angle) * off;
        const ex2 = x2 + Math.cos(angle) * off;
        const ey2 = y2 + Math.sin(angle) * off;

        const glowLine = this.add.line(0, 0, ex1, ey1, ex2, ey2, 0xffd700, 0.5).setLineWidth(20).setOrigin(0);
        const coreLine = this.add.line(0, 0, ex1, ey1, ex2, ey2, 0xffffff, 1).setLineWidth(6).setOrigin(0);

        this.tweens.add({
          targets: [glowLine, coreLine],
          alpha: { from: 0.3, to: 1 },
          duration: 600,
          yoyo: true,
          repeat: -1
        });
      }

      createScoreUI() {
        const scoreY = 42;

        this.playerScoreIcon = this.add.text(20, scoreY, "👨‍🚀", {
          fontSize: "24px"
        }).setOrigin(0, 0.5);

        this.playerScoreValue = this.add.text(58, scoreY, "0", {
          fontFamily: "Orbitron",
          fontSize: "22px",
          color: "#00f2ff",
          fontStyle: "bold"
        }).setOrigin(0, 0.5);

        this.botScoreIcon = this.add.text(this.size - 20, scoreY, "🤖", {
          fontSize: "24px"
        }).setOrigin(1, 0.5);

        this.botScoreValue = this.add.text(this.size - 58, scoreY, "0", {
          fontFamily: "Orbitron",
          fontSize: "22px",
          color: "#ff007a",
          fontStyle: "bold"
        }).setOrigin(1, 0.5);
      }

      updateScoreUI() {
        this.playerScoreValue.setText(String(this.scores.playerWins));
        this.botScoreValue.setText(String(this.scores.botWins));
      }

      createWalletUI() {
        const walletY = 720;
        this.add.text(this.size / 2 - 30, walletY, "✨", { fontSize: "24px" }).setOrigin(0.5);
        this.coinsText = this.add.text(this.size / 2 + 10, walletY, "0", {
          fontFamily: "Orbitron", fontSize: "26px", color: "#ffd700", fontStyle: "bold"
        }).setOrigin(0.5);
      }

      updateWalletUI() {
        this.coinsText.setText(`${Math.floor(this.displayedCoins)}`);
      }

      applyReward() {
        const reward = this.wallet.rollVictoryReward();
        const popup = this.add.text(this.size / 2, 680, `+${reward.gain}`, {
          fontFamily: "Orbitron", fontSize: "20px", color: "#FFD700", fontStyle: "bold"
        }).setOrigin(0.5);
        this.tweens.add({ targets: popup, y: 640, alpha: 0, duration: 800, onComplete: () => popup.destroy() });
        this.tweens.addCounter({
          from: this.displayedCoins, to: this.wallet.coins, duration: 700,
          onUpdate: (t) => { this.displayedCoins = t.getValue(); this.updateWalletUI(); }
        });
      }

      createRestartHint() {
        const centerX = this.size / 2;
        const centerY = 640;
        const bgColor = 0x1f2937;
        const activeColor = 0xffd700;

        const btn = this.add.rectangle(centerX, centerY, 200, 45, bgColor)
          .setInteractive({ useHandCursor: true });

        const btnText = this.add.text(centerX, centerY, "Новая игра", {
          fontFamily: "Orbitron",
          fontSize: "16px",
          color: "#ffffff"
        }).setOrigin(0.5);

        btn.on("pointerdown", () => {
          btn.setFillStyle(activeColor);
          btnText.setColor("#0b0e14");
        });

        btn.on("pointerup", () => {
          btn.setFillStyle(bgColor);
          btnText.setColor("#ffffff");
          this.scene.restart();
        });

        btn.on("pointerout", () => {
          btn.setFillStyle(bgColor);
          btnText.setColor("#ffffff");
        });
      }

      getCellCenter(i) {
        return [(i % 3) * this.cellSize + this.cellSize / 2, this.paddingTop + Math.floor(i / 3) * this.cellSize + this.cellSize / 2];
      }

      updateStatus(t) { this.statusText.setText(t); }
    }

    new Phaser.Game({
      type: Phaser.AUTO, parent: "game-root", width: 480, height: 760, backgroundColor: "#0B0E14", scene: TicTacToeScene
    });
  </script>
</body>

</html>
